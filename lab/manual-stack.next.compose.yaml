services:
  n8n-next-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${N8N_NEXT_POSTGRES_DB:-n8n_next}
      POSTGRES_USER: ${N8N_NEXT_POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_NEXT_POSTGRES_PASSWORD:-n8npass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_NEXT_POSTGRES_USER:-n8n} -d ${N8N_NEXT_POSTGRES_DB:-n8n_next}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - n8n_next_postgres_data:/var/lib/postgresql/data

  n8n-next:
    build:
      context: ..
      dockerfile: lab/Dockerfile.latest
    depends_on:
      n8n-next-postgres:
        condition: service_healthy
    ports:
      - "${N8N_NEXT_PORT:-5676}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-next-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_NEXT_POSTGRES_DB:-n8n_next}
      DB_POSTGRESDB_USER: ${N8N_NEXT_POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_NEXT_POSTGRES_PASSWORD:-n8npass}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_NEXT_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_NEXT_BASIC_AUTH_PASSWORD:-n8nlabpass}
      N8N_COMMUNITY_PACKAGES_ENABLED: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_EDITOR_BASE_URL: http://localhost:${N8N_NEXT_PORT:-5676}/
      N8N_ENCRYPTION_KEY: ${N8N_NEXT_ENCRYPTION_KEY:-zivego-next-live-lab-key-2026}
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      PACKAGE_SPEC: ${N8N_NEXT_PACKAGE_SPEC:-file:/packages/zivego-n8n-nodes-dfir-iris-3.0.0.tgz}
      WEBHOOK_URL: http://localhost:${N8N_NEXT_PORT:-5676}/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${N8N_NEXT_DATA_DIR:-./manual-stack.next.n8n}:/home/node/.n8n
      - ../artifacts:/packages:ro

volumes:
  n8n_next_postgres_data:
