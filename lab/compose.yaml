services:
  n8n-latest:
    build:
      context: ..
      dockerfile: lab/Dockerfile.latest
    ports:
      - "${N8N_LATEST_PORT:-5678}:5678"
    environment:
      GENERIC_TIMEZONE: "${GENERIC_TIMEZONE:-UTC}"
      N8N_COMMUNITY_PACKAGES_ENABLED: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_EDITOR_BASE_URL: "http://localhost:${N8N_LATEST_PORT:-5678}/"
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY:-lab-encryption-key-please-change}"
      N8N_HOST: "0.0.0.0"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "http"
      PACKAGE_SPEC: "${LATEST_PACKAGE_SPEC:-n8n-nodes-dfir-iris@2.0.1}"
      WEBHOOK_URL: "http://localhost:${N8N_LATEST_PORT:-5678}/"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/latest:/home/node/.n8n
      - ../artifacts:/packages:ro

  n8n-baseline:
    build:
      context: ..
      dockerfile: lab/Dockerfile.baseline
    ports:
      - "${N8N_BASELINE_PORT:-5679}:5678"
    environment:
      GENERIC_TIMEZONE: "${GENERIC_TIMEZONE:-UTC}"
      N8N_COMMUNITY_PACKAGES_ENABLED: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_EDITOR_BASE_URL: "http://localhost:${N8N_BASELINE_PORT:-5679}/"
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY:-lab-encryption-key-please-change}"
      N8N_HOST: "0.0.0.0"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "http"
      PACKAGE_SPEC: "${BASELINE_PACKAGE_SPEC:-n8n-nodes-dfir-iris@2.0.1}"
      WEBHOOK_URL: "http://localhost:${N8N_BASELINE_PORT:-5679}/"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/baseline:/home/node/.n8n
      - ../artifacts:/packages:ro
