name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - qa/**
      - hardening/**

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Unit and contract tests
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Pack tarball
        run: pnpm run pack:tarball

      - name: Publishability dry run
        run: pnpm publish --dry-run --access public --no-git-checks

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: artifacts/*.tgz
